{% macro paginate(pagination) %}
{% if pagination.pages > 1 %}
<nav class="flex justify-center mt-8 space-x-1">
    {% if pagination.has_prev %}
    <a href="{{ request.path }}?page={{ pagination.prev_num }}" class="px-3 py-2 text-sm rounded-lg border border-gray-200 hover:bg-primary-50 hover:text-primary-600 transition">&laquo; Prev</a>
    {% endif %}
    {% for p in pagination.iter_pages() %}
        {% if p %}
            <a href="{{ request.path }}?page={{ p }}" class="px-3 py-2 text-sm rounded-lg border {% if p == pagination.page %}bg-primary-600 text-white border-primary-600{% else %}border-gray-200 hover:bg-primary-50 hover:text-primary-600{% endif %} transition">{{ p }}</a>
        {% else %}
            <span class="px-3 py-2 text-sm text-gray-400">...</span>
        {% endif %}
    {% endfor %}
    {% if pagination.has_next %}
    <a href="{{ request.path }}?page={{ pagination.next_num }}" class="px-3 py-2 text-sm rounded-lg border border-gray-200 hover:bg-primary-50 hover:text-primary-600 transition">Next &raquo;</a>
    {% endif %}
</nav>
{% endif %}
{% endmacro %}
