<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
        <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">Admin Login</h1>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}
        <form method="post" class="space-y-4">
            <input type="text" name="username" placeholder="Username" required class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <input type="password" name="password" placeholder="Password" required class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <button type="submit" class="w-full py-3 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 transition">Login</button>
        </form>
    </div>
</body>
</html>
