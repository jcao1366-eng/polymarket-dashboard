<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-gray-900 text-white px-6 py-4 flex items-center justify-between">
        <span class="font-bold">Admin Panel</span>
        <div class="flex gap-4">
            <a href="{{ url_for('admin.dashboard') }}" class="hover:text-gray-300">Dashboard</a>
            <a href="{{ url_for('admin.products') }}" class="hover:text-gray-300">Products</a>
            <a href="{{ url_for('admin.logout') }}" class="hover:text-gray-300">Logout</a>
        </div>
    </nav>
    <div class="max-w-7xl mx-auto px-6 py-8">
        <h1 class="text-2xl font-bold mb-6">Orders</h1>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <table class="w-full">
                <thead class="bg-gray-50"><tr><th class="px-6 py-3 text-left text-sm font-medium text-gray-500">Order</th><th class="px-6 py-3 text-left text-sm font-medium text-gray-500">Email</th><th class="px-6 py-3 text-left text-sm font-medium text-gray-500">Total</th><th class="px-6 py-3 text-left text-sm font-medium text-gray-500">Status</th><th class="px-6 py-3 text-left text-sm font-medium text-gray-500">Update</th></tr></thead>
                <tbody class="divide-y divide-gray-100">
                {% for order in orders.items %}
                <tr>
                    <td class="px-6 py-4 font-mono text-sm">{{ order.order_number }}</td>
                    <td class="px-6 py-4 text-sm">{{ order.email }}</td>
                    <td class="px-6 py-4">${{ '%.2f'|format(order.total) }}</td>
                    <td class="px-6 py-4"><span class="px-2 py-1 text-xs font-medium rounded-full {% if order.status == 'paid' %}bg-green-100 text-green-700{% elif order.status == 'shipped' %}bg-blue-100 text-blue-700{% else %}bg-yellow-100 text-yellow-700{% endif %}">{{ order.status }}</span></td>
                    <td class="px-6 py-4">
                        <form method="post" action="{{ url_for('admin.update_status', order_id=order.id) }}" class="flex gap-2">
                            <select name="status" class="text-sm border rounded px-2 py-1">
                                <option value="pending" {% if order.status == 'pending' %}selected{% endif %}>Pending</option>
                                <option value="paid" {% if order.status == 'paid' %}selected{% endif %}>Paid</option>
                                <option value="shipped" {% if order.status == 'shipped' %}selected{% endif %}>Shipped</option>
                                <option value="delivered" {% if order.status == 'delivered' %}selected{% endif %}>Delivered</option>
                                <option value="refunded" {% if order.status == 'refunded' %}selected{% endif %}>Refunded</option>
                            </select>
                            <button type="submit" class="text-sm bg-primary-600 text-white px-3 py-1 rounded">Update</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
