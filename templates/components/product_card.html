{% macro product_card(product) %}
<div class="group bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-lg transition-shadow duration-300 border border-gray-100">
    <a href="{{ url_for('product.product_detail', slug=product.slug) }}" class="block aspect-square overflow-hidden bg-gray-100">
        <img src="{{ product.image_url or 'https://placehold.co/400x400/e9d5ff/7C3AED?text=' + product.name[:10] }}" alt="{{ product.name }}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy">
    </a>
    <div class="p-4">
        <a href="{{ url_for('product.product_detail', slug=product.slug) }}" class="block">
            <h3 class="font-medium text-gray-900 text-sm group-hover:text-primary-600 transition truncate">{{ product.name }}</h3>
        </a>
        <div class="mt-2 flex items-center gap-2">
            <span class="text-lg font-bold text-gray-900">${{ '%.2f'|format(product.base_price) }}</span>
            {% if product.compare_price and product.compare_price > product.base_price %}
            <span class="text-sm text-gray-400 line-through">${{ '%.2f'|format(product.compare_price) }}</span>
            <span class="text-xs font-medium text-green-600 bg-green-50 px-1.5 py-0.5 rounded-full">{{ product.discount_pct }}% OFF</span>
            {% endif %}
        </div>
        <form action="{{ url_for('cart.add') }}" method="post" class="mt-3">
            <input type="hidden" name="product_id" value="{{ product.id }}">
            <button type="submit" class="w-full py-2 bg-primary-600 text-white text-sm font-medium rounded-lg hover:bg-primary-700 transition-colors">Add to Cart</button>
        </form>
    </div>
</div>
{% endmacro %}
